[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_USE_NETLIFY_EDGE = "true"

# The Next.js plugin handles SSR, API routes, image optimization, etc.
# Netlify auto-installs this when it detects Next.js — declaring it
# explicitly makes the dependency obvious.
[[plugins]]
  package = "@netlify/plugin-nextjs"
